version: '3.8'

services:
  client:
    build:
      context: https://github.com/Apoll011/FinalistHub-client.git
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
        VITE_MODE: production
    ports:
      - '5173:80'
    depends_on:
      - server

  server:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - db_data:/app
    ports:
      - '8000:8000'
    command: ${COMMAND:-uvicorn main:app --host 0.0.0.0 --port 8000}

volumes:
  db_data:

